{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">XML 数据导入</h2>

    <form method="POST" action="/xml-import">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="xml_data">输入 XML 数据</label>
            <textarea class="form-input" id="xml_data" name="xml_data" rows="12" placeholder="在此粘贴 XML 数据..." style="font-family:'Courier New',monospace; font-size:13px; resize:vertical;" required></textarea>
        </div>
        <button class="btn btn-primary btn-block" type="submit">导入</button>
    </form>

    {% if result %}
    <hr style="margin: 24px 0; border: none; border-top: 1px solid #eee;">
    <p class="guest-text">解析结果</p>
    <pre style="background:#f5f5f5; padding:12px; border-radius:6px; font-size:13px; max-height:400px; overflow-y:auto; word-break:break-all;">{{ result }}</pre>
    {% endif %}
</div>
{% endblock %}
