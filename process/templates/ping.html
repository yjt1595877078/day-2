{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">Ping 网络诊断</h2>

    <form method="POST" action="/ping" style="display: flex; gap: 10px; margin-bottom: 16px;">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input class="form-input" type="text" name="ip" placeholder="输入 IP 地址（如 8.8.8.8）" style="flex: 1;" required>
        <button class="btn btn-primary" type="submit">Ping</button>
    </form>

    {% if output %}
    <div style="background:#000; color:#0f0; font-family:'Courier New',monospace; font-size:13px; padding:16px; border-radius:6px; max-height:500px; overflow-y:auto; white-space:pre-wrap; word-break:break-all;">
{{ output }}
    </div>
    {% endif %}
</div>
{% endblock %}
