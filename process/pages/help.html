<h3>帮助中心</h3>
<p>欢迎使用用户管理系统！以下是一些常见问题的解答：</p>

<ul>
    <li><strong>如何注册？</strong>点击导航栏的"注册"链接，填写用户名、密码、邮箱和手机号即可完成注册。</li>
    <li><strong>如何登录？</strong>在登录页面输入用户名和密码即可登录系统。</li>
    <li><strong>如何搜索用户？</strong>登录后在首页搜索框中输入用户名或邮箱关键词进行搜索。</li>
    <li><strong>如何上传头像？</strong>登录后点击导航栏的"上传头像"链接，选择图片文件上传。</li>
    <li><strong>如何查看个人资料？</strong>登录后点击导航栏的"个人中心"查看完整资料。</li>
    <li><strong>如何充值？</strong>在个人中心页面输入金额并点击充值按钮。</li>
</ul>

<p>如有其他问题，请联系系统管理员。</p>
